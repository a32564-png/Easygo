            const stats = useMemo(() => {
                const res = {}; 
                members.forEach(m => res[m.id] = {totals: {}, total: 0, paidTotal: 0, pendingTotal: 0, pendingForeign: 0, pendingTWD: 0, details: []});
                let totalPendingForeign = 0; let totalPendingTWD = 0;

                const processItem = (item, isShopping = false) => {
                    const cost = Number(item.cost)||0; if(cost===0) return;
                    const payers = isShopping ? (item.payerId ? [item.payerId] : []) : (item.payerIds || []);

                    payers.forEach(pid => {
                        if(res[pid]) {
                            const myShare = cost / payers.length; 
                            res[pid].total += myShare;
                            const curr = item.currency || currency;
                            if(!res[pid].totals[curr]) res[pid].totals[curr] = 0;
                            res[pid].totals[curr] += myShare;
                            res[pid].details.push({...item, _isShopping: isShopping});
                            
                            if (item.category !== 'loot') {
                                if (!item.isPaid) {
                                    res[pid].pendingTotal += myShare;
                                    if (item.currency === 'TWD') { 
                                        res[pid].pendingTWD += myShare; 
                                        totalPendingTWD += myShare; 
                                    } else { 
                                        res[pid].pendingForeign += myShare; 
                                        totalPendingForeign += myShare; 
                                    }
                                } else { 
                                    res[pid].paidTotal += myShare; 
                                }
                            }
                        }
                    });
                };

                itinerary.forEach(i => processItem(i));
                shoppingList.forEach(s => {
                    if (s.type === 'split') processItem(s, true);
                });

                return {res, totalPendingForeign, totalPendingTWD};
            }, [itinerary, shoppingList, members, currency]);

            // Settlement Logic V84 (UI Tweaks)
            const settlementStats = useMemo(() => {
                const data = {};
                members.forEach(m => data[m.id] = { history: 0, paid_net: 0, shared_net: 0 });

                const processSettlement = (item, isShopping = false) => {
                    const cost = Number(item.cost) || 0;
                    if (cost === 0) return;
                    
                    let costInTWD = cost;
                    if (item.currency !== 'TWD') {
                        if (rate > 0) costInTWD = cost * rate;
                    }

                    // Define Participants
                    const payers = isShopping ? (item.payerId ? [item.payerId] : []) : (item.payerIds || []);
                    let beneficiaries = [];
                    if (item.category === 'loot') {
                        beneficiaries = payers; // Loot implies personal cost
                    } else {
                        const sharedIds = item.sharedInvolvedIds || [];
                        if (sharedIds.length === 0) beneficiaries = members.map(m => m.id);
                        else beneficiaries = sharedIds;
                    }

                    // 1. History (Total Consumption) - Always Add
                    if (beneficiaries.length > 0) {
                        const costPerPerson = costInTWD / beneficiaries.length;
                        beneficiaries.forEach(bid => {
                            if (data[bid]) data[bid].history += costPerPerson;
                        });
                    }

                    // 2. Debt Calculation (Lent/Owe) - Skip if Paid or Loot
                    if (!item.isPaid && item.category !== 'loot') {
                        // Add to Payer's Credit (Lent)
                        payers.forEach(pid => {
                            if (data[pid]) data[pid].paid_net += (costInTWD / payers.length);
                        });
                        // Add to Beneficiary's Debt (Owe)
                        if (beneficiaries.length > 0) {
                            const costPerPerson = costInTWD / beneficiaries.length;
                            beneficiaries.forEach(bid => {
                                if (data[bid]) data[bid].shared_net += costPerPerson;
                            });
                        }
                    }
                };

                itinerary.forEach(i => processSettlement(i));
                shoppingList.forEach(s => { if (s.type === 'split') processSettlement(s, true); });

                // Calculate Net Lent/Owe
                const finalData = {};
                Object.keys(data).forEach(id => {
                    const net = data[id].paid_net - data[id].shared_net;
                    finalData[id] = {
                        history: data[id].history,
                        lent: net > 0 ? net : 0,
                        owe: net < 0 ? -net : 0
                    };
                });

                // Generate Transfer Suggestions
                const debtors = [];
                const creditors = [];
                Object.entries(finalData).forEach(([id, val]) => {
                    if (val.owe > 1) debtors.push({ id, amount: val.owe });
                    else if (val.lent > 1) creditors.push({ id, amount: val.lent });
                });

                const suggestions = [];
                let i = 0, j = 0;
                while (i < debtors.length && j < creditors.length) {
                    const debt = debtors[i];
                    const credit = creditors[j];
                    const amount = Math.min(debt.amount, credit.amount);
                    
                    if (amount > 0) {
                        const debtorName = members.find(m => m.id === debt.id)?.name || '???';
                        const creditorName = members.find(m => m.id === credit.id)?.name || '???';
                        suggestions.push(`${debtorName} 給 ${creditorName}：${Math.round(amount).toLocaleString()}`);
                    }

                    debt.amount -= amount;
                    credit.amount -= amount;

                    if (debt.amount < 1) i++;
                    if (credit.amount < 1) j++;
                }

                return { data: finalData, suggestions };
            }, [itinerary, shoppingList, members, currency, rate]);

            // Helper for Editing Rate
            const [isEditingRate, setIsEditingRate] = useState(false);
            const [tempRate, setTempRate] = useState(rate);

            return ( 
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/50 backdrop-blur-sm animate-fade-in" onClick={onClose}> 
                    <div className="bg-white w-full max-w-md rounded-t-3xl shadow-2xl p-6 h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}> 
                        {accountingMember ? ( 
                            <div className="flex-1 overflow-y-auto"> 
                                <div className="flex justify-between items-center mb-4">
                                    <button onClick={()=>window.history.back()} className="text-sm text-stone-500 flex items-center gap-1"><Icons.ArrowLeft/> 返回總覽</button>
                                    {!isLocked && (
                                        <button onClick={() => handleBatchSettle(accountingMember.id)} className="text-sm bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-full font-bold flex items-center gap-1 active:scale-95 transition-transform">
                                            ✅ 全部結清
                                        </button>
                                    )}
                                </div>
                                <div className="bg-stone-50 p-4 rounded-2xl mb-4 text-center border border-stone-100">
                                    <div className="text-3xl mb-2">{accountingMember.emoji}</div>
                                    <h2 className="font-bold text-lg text-stone-700">{accountingMember.name} 的消費明細</h2>
                                    <div className="mt-2 flex flex-col items-center justify-center gap-1">
                                        <span className="text-xs text-stone-500">總計墊付：</span>
                                        {Object.entries(stats.res[accountingMember.id].totals).map(([curr, amt]) => (
                                            <div key={curr} className="font-bold text-theme-main text-lg leading-tight">
                                                {curr} {Math.round(amt).toLocaleString()}
                                            </div>
                                        ))}
                                    </div>
                                </div> 
                                <div className="space-y-2"> 
                                    {stats.res[accountingMember.id].details.map((item, idx) => ( 
                                        <div key={idx} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${item.isPaid ? 'bg-stone-50 border-stone-200 opacity-60' : 'bg-white border-stone-100 shadow-sm'}`}>
                                            <div className="flex-1 cursor-pointer" onClick={() => onEditItem(item, item._isShopping)}>
                                                <div className="font-bold text-stone-700 text-sm mb-0.5">{item.title || item.text}</div>
                                                <div className="text-xs text-stone-400">
                                                    {item._isShopping 
                                                        ? <span className="text-emerald-500 font-bold">🛒 購物分帳</span> 
                                                        : item.category === 'loot' 
                                                            ? '戰利品' 
                                                            : `Day ${item.day} • ${item.category === 'transport' ? '交通' : item.category === 'hotel' ? '住宿' : '行程'}`
                                                    }
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <div className="text-right">
                                                    <div className={`font-bold text-sm ${item.isPaid ? 'text-stone-400 line-through' : 'text-theme-main'}`}>{item.currency} {Number(item.cost).toLocaleString()}</div>
                                                    {item.currency !== 'TWD' && (<div className="text-xs text-stone-400">≈ TWD {Math.floor(item.cost * rate).toLocaleString()}</div>)}
                                                </div>
                                                {item.category !== 'loot' && (
                                                    <button onClick={(e) => { e.stopPropagation(); if(isLocked) return alert("行程已鎖定"); onTogglePaid(item, item._isShopping); }} className={`w-8 h-8 rounded-full border flex items-center justify-center transition-all ${item.isPaid ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-stone-300 text-stone-200 hover:border-theme-main'}`}>
                                                        {item.isPaid ? <Icons.Check/> : <Icons.Circle/>}
                                                    </button>
                                                )}
                                            </div>
                                        </div> 
                                    ))} 
                                </div> 
                            </div> 
                        ) : ( 
                            <> 
                                <div className="flex justify-between items-center pb-3 border-b border-stone-100">
                                    <h2 className="font-bold text-lg text-theme-main">分帳管家</h2>
                                    <div className="flex gap-2">
                                        <button onClick={() => setIsEditingRate(!isEditingRate)} className="px-3 py-1.5 bg-yellow-50 text-yellow-600 rounded-full active:scale-95 flex items-center gap-1 border border-yellow-200 shadow-sm">
                                            <span className="text-lg">💱</span>
                                            <span className="text-xs font-bold">匯率: {rate}</span>
                                        </button>
                                        <button onClick={onClose} className="text-lg">❌</button>
                                    </div>
                                </div> 

                                {isEditingRate && (
                                    <div className="bg-yellow-50 p-3 rounded-xl mb-3 flex items-center gap-2 border border-yellow-100 animate-fade-in">
                                        <span className="text-xs font-bold text-yellow-600">匯率設定:</span>
                                        <input type="number" step="0.0001" value={tempRate} onChange={e => setTempRate(e.target.value)} className="flex-1 p-1 rounded border border-yellow-200 text-sm" />
                                        <button onClick={() => { onRateChange(tempRate); setIsEditingRate(false); }} className="text-xs bg-yellow-500 text-white px-3 py-1.5 rounded-lg font-bold">儲存</button>
                                    </div>
                                )}

                                <div className="flex p-1 bg-stone-100 rounded-xl mb-4">
                                    <button onClick={() => setMode('overview')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${mode==='overview' ? 'bg-white shadow text-theme-main' : 'text-stone-400'}`}>消費明細</button>
                                    <button onClick={() => setMode('report')} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${mode==='report' ? 'bg-white shadow text-theme-main' : 'text-stone-400'}`}>結算報表</button>
                                </div>

                                {mode === 'overview' ? (
                                    <>
                                        <div className="text-center py-6 bg-sky-50 rounded-2xl mb-4 border border-sky-100">
                                            <p className="text-stone-400 text-xs font-bold tracking-wider mb-1">全體未結清墊付額</p>
                                            <div className="flex flex-col items-center">
                                                <p className="text-4xl font-bold text-theme-main">{currency} {(currency === 'TWD' ? stats.totalPendingTWD : stats.totalPendingForeign).toLocaleString()}</p>
                                                {currency !== 'TWD' && stats.totalPendingTWD > 0 && (
                                                    <p className="text-lg font-bold text-stone-500 flex items-center gap-1">
                                                        <span className="text-xs bg-stone-200 px-1 rounded">TWD</span> {stats.totalPendingTWD.toLocaleString()}
                                                    </p>
                                                )}
                                            </div>
                                        </div> 
                                        <div className="space-y-3 overflow-y-auto flex-1 pb-4"> 
                                            {members.length > 0 ? members.map(m => { 
                                                const data = stats.res[m.id]; 
                                                if (data.total === 0) return null; 
                                                const isAllSettled = data.pendingTotal === 0; 
                                                return ( 
                                                    <div key={m.id} onClick={()=>{setAccountingMember(m);}} className={`flex items-center justify-between p-4 rounded-xl border transition-all cursor-pointer ${isAllSettled ? 'bg-stone-50 border-stone-200' : 'bg-white border-stone-100 hover:bg-stone-50 shadow-sm'}`}>
                                                        <div className="flex items-center gap-3 flex-1">
                                                            <div className={`w-12 h-12 ${m.color} rounded-full text-white flex items-center justify-center shadow-md text-2xl flex-shrink-0`}>{m.emoji}</div>
                                                            <div className="flex-shrink-0"><span className="font-bold text-stone-800 text-lg block">{m.name}</span><span className="text-[10px] text-stone-400 bg-stone-100 px-1.5 py-0.5 rounded">消費明細 ></span></div>
                                                        </div>
                                                        <div className="text-right flex flex-col items-end justify-center min-w-[100px]"> 
                                                            {isAllSettled ? (<span className="text-xs bg-green-100 text-green-600 px-2 py-1 rounded-full font-bold">已結清</span>) : ( 
                                                                <>
                                                                    <div className={`font-bold text-lg text-theme-main whitespace-nowrap`}>{currency} {(currency === 'TWD' ? data.pendingTWD : data.pendingForeign).toLocaleString()}</div>
                                                                    {currency !== 'TWD' && data.pendingTWD > 0 && <div className="text-sm font-bold text-stone-500 whitespace-nowrap">TWD {data.pendingTWD.toLocaleString()}</div>}
                                                                </> 
                                                            )} 
                                                        </div>
                                                    </div> 
                                                ); 
                                            }) : <div className="text-center text-stone-400 py-10">請先至首頁建立參與者</div>} 
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 overflow-y-auto flex flex-col">
                                        <div className="bg-stone-50 p-4 rounded-xl border border-stone-100 mb-4">
                                            <h3 className="font-bold text-sm text-stone-700 mb-3 text-center">轉帳建議 (只計算未結清項目)</h3>
                                            {settlementStats.suggestions.length > 0 ? (
                                                <div className="space-y-2">
                                                    {settlementStats.suggestions.map((s, i) => (
                                                        <div key={i} className="bg-white p-3 rounded-lg border border-l-4 border-l-emerald-500 shadow-sm text-sm font-bold text-stone-700 flex justify-between">
                                                            {s} <span className="text-xs text-stone-400">TWD</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="text-center text-stone-400 text-xs py-2">目前沒有需要轉帳的款項</div>
                                            )}
                                        </div>

                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="border-b text-stone-400 text-xs">
                                                    <th className="pb-2 text-left w-[30%] pl-12">成員</th>
                                                    <th className="pb-2 text-right w-[24%]">總消費</th>
                                                    <th className="pb-2 text-right w-[23%]">代墊</th>
                                                    <th className="pb-2 text-right w-[23%] pr-3">應付</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-stone-100">
                                                {members.map(m => {
                                                    const d = settlementStats.data[m.id];
                                                    return (
                                                        <tr key={m.id}>
                                                            <td className="py-3 pl-2">
                                                                <div className="flex items-center gap-2">
                                                                    <div className={`w-8 h-8 ${m.color} rounded-full text-white flex items-center justify-center text-xs shadow-sm shrink-0`}>{m.emoji}</div>
                                                                    <span className="font-bold text-stone-700 text-sm truncate">{m.name}</span>
                                                                </div>
                                                            </td>
                                                            <td className="py-3 text-right text-stone-500 font-medium">{Math.round(d.history).toLocaleString()}</td>
                                                            <td className="py-3 text-right text-emerald-500 font-bold">{Math.round(d.lent).toLocaleString()}</td>
                                                            <td className="py-3 text-right pr-1 text-red-500 font-bold">{Math.round(d.owe).toLocaleString()}</td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                        <div className="text-[10px] text-center text-stone-300 mt-4 pb-4">
                                            * 報表統一以 TWD (台幣) 計算<br/>
                                            * 當前匯率: {rate}
                                        </div>
                                    </div>
                                )}
                            </> 
                        )} 
                    </div> 
                </div> 
            ); 
        };

        // --- Main App ---

        function App() {
            const [viewMode, setViewMode] = useState('tripList');
            const [trips, setTrips] = useState([]);
            const [currentTrip, setCurrentTrip] = useState(null);
            const [itinerary, setItinerary] = useState([]);
            const [luggageList, setLuggageList] = useState([]); 
            const [members, setMembers] = useState([]); 
            const [shoppingList, setShoppingList] = useState([]); 
            const [selectedDay, setSelectedDay] = useState(1);
            const [isLoading, setIsLoading] = useState(true); 
            
            // UI State Refs for History Management
            const uiState = useRef({
                viewMode: 'tripList',
                isTripModalOpen: false,
                isItemModalOpen: false,
                isMoveModalOpen: false,
                isLockModalOpen: false,
                isExportModalOpen: false,
                isMemberModalOpen: false,
                isLuggageModalOpen: false,
                showAccounting: false,
                isLootModalOpen: false,
                isShoppingListOpen: false,
                isShoppingItemModalOpen: false,
                checkPromptItem: null,
                previewImage: null, 
                selectMode: false, 
                reorderMode: false,
                accountingMember: null 
            });

            // State Setters Wrapper
            const [isTripModalOpen, setIsTripModalOpen] = useState(false);
            const [isItemModalOpen, setIsItemModalOpen] = useState(false);
            const [isMoveModalOpen, setIsMoveModalOpen] = useState(false);
            const [isLockModalOpen, setIsLockModalOpen] = useState(false);
            const [isExportModalOpen, setIsExportModalOpen] = useState(false);
            const [isMemberModalOpen, setIsMemberModalOpen] = useState(false); 
            const [isLuggageModalOpen, setIsLuggageModalOpen] = useState(false); 
            const [showAccounting, setShowAccounting] = useState(false);
            const [isLootModalOpen, setIsLootModalOpen] = useState(false); 
            const [activeLootMember, setActiveLootMember] = useState(null); 
            
            const [isShoppingListOpen, setIsShoppingListOpen] = useState(false);
            const [isShoppingItemModalOpen, setIsShoppingItemModalOpen] = useState(false);
            const [editingShoppingItem, setEditingShoppingItem] = useState(null);
            const [checkPromptItem, setCheckPromptItem] = useState(null);
            const [pendingShoppingItem, setPendingShoppingItem] = useState(null); 
            const [forcePayerSelectInItemModal, setForcePayerSelectInItemModal] = useState(false);

            const [editingItem, setEditingItem] = useState(null);
            const [reorderMode, setReorderMode] = useState(false);
            const [selectMode, setSelectMode] = useState(false);
            const [selectedItemIds, setSelectedItemIds] = useState(new Set());
            const [user, setUser] = useState(null);
            const [lockPassword, setLockPassword] = useState('');
            const [previewImage, setPreviewImage] = useState(null);
            const [accountingMember, setAccountingMember] = useState(null);

            // Ref for Day Scroll
            const daysContainerRef = useRef(null);

            // Sync Ref with State for History Listener
            useEffect(() => {
                uiState.current = {
                    viewMode, isTripModalOpen, isItemModalOpen, isMoveModalOpen, isLockModalOpen,
                    isExportModalOpen, isMemberModalOpen, isLuggageModalOpen, showAccounting,
                    isLootModalOpen, isShoppingListOpen, isShoppingItemModalOpen, checkPromptItem,
                    previewImage, selectMode, reorderMode, accountingMember
                };
            }, [viewMode, isTripModalOpen, isItemModalOpen, isMoveModalOpen, isLockModalOpen, isExportModalOpen, isMemberModalOpen, isLuggageModalOpen, showAccounting, isLootModalOpen, isShoppingListOpen, isShoppingItemModalOpen, checkPromptItem, previewImage, selectMode, reorderMode, accountingMember]);

            // Smart Navigation Helper
            const openModal = (setter) => {
                window.history.pushState({ modal: true }, '');
                setter(true);
            };

            const closeModal = () => {
                window.history.back(); // This triggers popstate, which closes the modal
            };

            // Image Preview Helper
            const handlePreviewImage = (url) => {
                if(url) window.history.pushState({ preview: true }, '');
                setPreviewImage(url);
            }

            // Mode Helper
            const toggleMode = (setter, val) => {
                if(val) window.history.pushState({ mode: true }, '');
                else if (!val && (selectMode || reorderMode)) window.history.back(); 
                setter(val);
            }

            const handleAccountingMember = (member) => {
                if(member) window.history.pushState({ accountingDetail: true }, '');
                setAccountingMember(member);
            }

            // Global History Listener
            useEffect(() => {
                const handlePopState = (event) => {
                    const s = uiState.current;
                    
                    if (s.previewImage) setPreviewImage(null);
                    else if (s.selectMode || s.reorderMode) {
                        setSelectMode(false);
                        setReorderMode(false);
                        setSelectedItemIds(new Set());
                    }
                    else if (s.checkPromptItem) setCheckPromptItem(null);
                    else if (s.isShoppingItemModalOpen) setIsShoppingItemModalOpen(false);
                    else if (s.isItemModalOpen) setIsItemModalOpen(false);
                    else if (s.isTripModalOpen) setIsTripModalOpen(false);
                    else if (s.isMoveModalOpen) setIsMoveModalOpen(false);
                    else if (s.isLockModalOpen) setIsLockModalOpen(false);
                    else if (s.accountingMember) setAccountingMember(null);
                    else if (s.isExportModalOpen) setIsExportModalOpen(false);
                    else if (s.isMemberModalOpen) setIsMemberModalOpen(false);
                    else if (s.isLuggageModalOpen) setIsLuggageModalOpen(false);
                    else if (s.showAccounting) setShowAccounting(false);
                    else if (s.isLootModalOpen) setIsLootModalOpen(false);
                    else if (s.isShoppingListOpen) setIsShoppingListOpen(false);
                    else if (s.viewMode === 'itinerary') {
                        setViewMode('tripList');
                        setCurrentTrip(null);
                    }
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // Auto-Scroll Active Day Button
            useEffect(() => {
                if (daysContainerRef.current) {
                    const activeBtn = daysContainerRef.current.children[selectedDay - 1];
                    if (activeBtn) {
                        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    }
                }
            }, [selectedDay]);

            // Swipe Logic Refs
            const touchStartX = useRef(0);
            const touchEndX = useRef(0);
            const touchStartY = useRef(0);

            useEffect(() => { auth.signInAnonymously().then(u => setUser(u.user)).catch(console.error); }, []);

            useEffect(() => {
                if(!user) return;
                const unsubscribe = db.collection('trips_v14').orderBy('startDate', 'desc').onSnapshot(snapshot => {
                    setTrips(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoading(false); 
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (!currentTrip || !user) return;
                const unsubItems = db.collection('trips_v14').doc(currentTrip.id).collection('items').onSnapshot(snapshot => {
                    setItinerary(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const unsubTrip = db.collection('trips_v14').doc(currentTrip.id).onSnapshot(doc => {
                    if(doc.exists) setCurrentTrip({id: doc.id, ...doc.data()});
                });
                const unsubMembers = db.collection('trips_v14').doc(currentTrip.id).collection('members').onSnapshot(snapshot => {
                    const mems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setMembers(mems);
                    if(mems.length > 0 && !activeLootMember) setActiveLootMember(mems[0].id);
                });
                const unsubLuggage = db.collection('trips_v14').doc(currentTrip.id).collection('luggage').orderBy('createdAt').onSnapshot(snapshot => {
                    setLuggageList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const unsubShopping = db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list').onSnapshot(snapshot => {
                    setShoppingList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { unsubItems(); unsubTrip(); unsubMembers(); unsubLuggage(); unsubShopping(); };
            }, [currentTrip?.id, user]);

            const currentDayItems = useMemo(() => {
                return itinerary.filter(i => i.day === selectedDay && i.category !== 'loot').sort((a, b) => (a.customOrder || 0) - (b.customOrder || 0)); 
            }, [itinerary, selectedDay]);

            const tripDays = useMemo(() => { 
                if(!currentTrip || !currentTrip.startDate || !currentTrip.endDate) return [1];
                const start = new Date(currentTrip.startDate);
                const end = new Date(currentTrip.endDate);
                const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) + 1; 
                return Array.from({length: diffDays}, (_, i) => i + 1); 
            }, [currentTrip]);
            const currentDayInfo = useMemo(() => currentTrip ? getDayInfo(currentTrip.startDate, selectedDay) : {}, [currentTrip, selectedDay]);

            // CRUD Operations
            const handleSaveTrip = async (tripData) => {
                if (tripData.id) await db.collection('trips_v14').doc(tripData.id).update(tripData);
                else await db.collection('trips_v14').add({ ...tripData, isLocked: false, lockCode: '' });
                setEditingItem(null); 
            };
            const handleDeleteTrip = async (id) => {
                if(window.confirm('確定刪除整趟旅遊？')) { 
                    await db.collection('trips_v14').doc(id).delete(); 
                    closeModal(); 
                }
            };
            const handleSaveItem = async (itemData) => {
                const ref = db.collection('trips_v14').doc(currentTrip.id).collection('items');
                if (!itemData.customOrder) itemData.customOrder = Date.now();
                
                let newItemId = itemData.id;

                if (itemData.id) {
                    await ref.doc(itemData.id).update(itemData);
                } else {
                    const docRef = await ref.add({ ...itemData, isPaid: false });
                    newItemId = docRef.id;
                }
                
                if (pendingShoppingItem) {
                    await db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list').doc(pendingShoppingItem.id).update({ 
                        isBought: true,
                        linkedLootId: newItemId 
                    });
                    setPendingShoppingItem(null);
                }
                setEditingItem(null); 
            };
            
            const handleDeleteItem = async (id, closeAfterDelete = true) => { 
                if(window.confirm('確定刪除？')) {
                    const docRef = db.collection('trips_v14').doc(currentTrip.id).collection('items').doc(id);
                    await docRef.delete();
                    if(closeAfterDelete) closeModal();
                }
            };

            const togglePaid = async (item) => { await db.collection('trips_v14').doc(currentTrip.id).collection('items').doc(item.id).update({ isPaid: !item.isPaid }); };
            
            const handleSaveShoppingItem = async (data) => {
                const ref = db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list');
                const timestamp = Date.now();
                if (data.id) {
                    await ref.doc(data.id).update(data);
                } else {
                    await ref.add({ ...data, createdAt: timestamp, isBought: false, type: 'normal', isPaid: false });
                }
                
                if (pendingShoppingItem && data.type === 'split') {
                     await ref.doc(pendingShoppingItem.id).update({ isBought: true, type: 'split', payerId: data.payerId, isPaid: false });
                     setPendingShoppingItem(null);
                }
                setEditingShoppingItem(null);
            };

            const handleDeleteShoppingItem = async (id, closeAfterDelete = false) => {
                if (window.confirm("確定刪除此購物項目？")) {
                    await db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list').doc(id).delete();
                    if(closeAfterDelete) closeModal(); 
                }
            };

            const handleCheckShoppingItem = (item) => {
                if (item.isBought) return; 
                window.history.pushState({ checkPrompt: true }, '');
                setCheckPromptItem(item);
            };

            const handleRestoreShoppingItem = async (item) => {
                let confirmMsg = "確定要恢復為未購買狀態嗎？";
                if (item.linkedLootId) confirmMsg = "此項目已轉為戰利品，恢復將同步刪除該筆戰利品紀錄，確定嗎？";

                if (window.confirm(confirmMsg)) {
                    if (item.linkedLootId) {
                        try {
                            await db.collection('trips_v14').doc(currentTrip.id).collection('items').doc(item.linkedLootId).delete();
                        } catch(e) { console.log("Loot already deleted or error", e); }
                    }
                    
                    await db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list').doc(item.id).update({
                        isBought: false,
                        type: 'normal',
                        isPaid: false,
                        payerId: firebase.firestore.FieldValue.delete(),
                        linkedLootId: firebase.firestore.FieldValue.delete(),
                    });
                }
            };

            const handleShoppingCheckSelection = async (option) => {
                const item = checkPromptItem;
                if (!item) return;

                setCheckPromptItem(null);

                setTimeout(async () => {
                    if (option === 'simple') {
                        await db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list').doc(item.id).update({ isBought: true });
                    } else if (option === 'loot') {
                        setEditingItem({
                            title: item.text,
                            cost: item.cost,
                            currency: item.currency,
                            fileUrl: item.fileUrl,
                            memo: item.memo,
                            category: 'loot',
                            day: selectedDay,
                            payerIds: [] 
                        });
                        setForcePayerSelectInItemModal(true); 
                        setPendingShoppingItem(item); 
                        openModal(setIsItemModalOpen);
                    } else if (option === 'split') {
                        setEditingShoppingItem({
                            ...item,
                            type: 'split',
                            payerId: '' 
                        });
                        setPendingShoppingItem(item); 
                        openModal(setIsShoppingItemModalOpen);
                    }
                }, 100);
            };

            const toggleShoppingPaid = async (item) => {
                await db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list').doc(item.id).update({ isPaid: !item.isPaid });
            };

            const toggleChecklistItem = async (itemId, index) => {
                const item = itinerary.find(i => i.id === itemId); if (!item || !item.checklist) return;
                const newChecklist = [...item.checklist]; newChecklist[index].checked = !newChecklist[index].checked;
                await db.collection('trips_v14').doc(currentTrip.id).collection('items').doc(itemId).update({ checklist: newChecklist });
            };

            const handleAddMember = async (memberData) => { await db.collection('trips_v14').doc(currentTrip.id).collection('members').add(memberData); };
            const handleDeleteMember = async (id) => {
                if(window.confirm('刪除此參與者？相關的分帳紀錄也會被清除喔！')) {
                    const batch = db.batch();
                    const itemsRef = db.collection('trips_v14').doc(currentTrip.id).collection('items');
                    itinerary.forEach(item => {
                        let needsUpdate = false;
                        let updates = {};
                        if (item.payerIds && item.payerIds.includes(id)) {
                            updates.payerIds = item.payerIds.filter(pid => pid !== id);
                            needsUpdate = true;
                        }
                        if (item.sharedInvolvedIds && item.sharedInvolvedIds.includes(id)) {
                             updates.sharedInvolvedIds = item.sharedInvolvedIds.filter(pid => pid !== id);
                             needsUpdate = true;
                        }
                        if(needsUpdate) batch.update(itemsRef.doc(item.id), updates);
                    });
                    await batch.commit();
                    await db.collection('trips_v14').doc(currentTrip.id).collection('members').doc(id).delete();
                }
            };
            const handleAddLuggage = async (text) => {
                if(!text) return;
                const checks = {}; 
                members.forEach(m => checks[m.id] = false); 
                await db.collection('trips_v14').doc(currentTrip.id).collection('luggage').add({ text, checks, createdAt: Date.now() });
            };
            const handleToggleLuggage = async (luggageId, memberId, currentVal) => {
                const luggage = luggageList.find(l => l.id === luggageId); if(!luggage) return;
                await db.collection('trips_v14').doc(currentTrip.id).collection('luggage').doc(luggageId).update({ [`checks.${memberId}`]: !currentVal });
            };
            const handleDeleteLuggage = async (id) => { if(window.confirm('刪除此項目？')) await db.collection('trips_v14').doc(currentTrip.id).collection('luggage').doc(id).delete(); };

            const handleReorder = async (item, direction) => {
                if (currentTrip.isLocked) { alert("行程已鎖定"); return; }
                const items = [...currentDayItems];
                const idx = items.findIndex(i => i.id === item.id); if (idx === -1) return;
                let targetIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (targetIdx >= 0 && targetIdx < items.length) {
                    const targetItem = items[targetIdx];
                    const ref = db.collection('trips_v14').doc(currentTrip.id).collection('items');
                    const itemOrder = item.customOrder || Date.now(); const targetOrder = targetItem.customOrder || Date.now();
                    if (itemOrder === targetOrder) await ref.doc(targetItem.id).update({ customOrder: itemOrder + 1 });
                    else { await ref.doc(targetItem.id).update({ customOrder: itemOrder }); await ref.doc(item.id).update({ customOrder: targetOrder }); }
                }
            };
            const toggleSelect = (id) => { const newSet = new Set(selectedItemIds); if (newSet.has(id)) newSet.delete(id); else newSet.add(id); setSelectedItemIds(newSet); };
            const handleBatchMove = async (targetDay, mode) => {
                if (selectedItemIds.size === 0) return;
                const batch = db.batch(); const ref = db.collection('trips_v14').doc(currentTrip.id).collection('items');
                const itemsToMove = itinerary.filter(i => selectedItemIds.has(i.id));
                if (mode === 'copy') { itemsToMove.forEach(item => { const newItemRef = ref.doc(); const { id, ...data } = item; batch.set(newItemRef, { ...data, day: targetDay, customOrder: Date.now() + Math.random() }); }); } 
                else { itemsToMove.forEach(item => { batch.update(ref.doc(item.id), { day: targetDay }); }); }
                await batch.commit(); setSelectMode(false); setSelectedItemIds(new Set()); closeModal(); alert(mode === 'copy' ? "複製完成" : "移動完成");
            };
            const handleLockTrip = async (password) => {
                if (!password || password.length !== 4) { alert("請輸入4位數密碼"); return; }
                if (currentTrip.isLocked) {
                    if (password === currentTrip.lockCode) { await db.collection('trips_v14').doc(currentTrip.id).update({ isLocked: false, lockCode: '' }); closeModal(); } else alert("密碼錯誤");
                } else { await db.collection('trips_v14').doc(currentTrip.id).update({ isLocked: true, lockCode: password }); closeModal(); }
            };
            
            const handleEditFromAccounting = (item, isShopping) => { 
                if (isShopping) {
                    setEditingShoppingItem(item);
                    openModal(setIsShoppingItemModalOpen);
                } else {
                    setEditingItem(item); 
                    setForcePayerSelectInItemModal(false);
                    openModal(setIsItemModalOpen); 
                }
            };

            const togglePaidFromAccounting = (item, isShopping) => {
                if (isShopping) toggleShoppingPaid(item);
                else togglePaid(item);
            };

            const handleAddLoot = () => {
                if(!activeLootMember) return alert("請先建立成員");
                setEditingItem({ category: 'loot', payerIds: [activeLootMember], day: selectedDay, images: [] });
                setForcePayerSelectInItemModal(false);
                openModal(setIsItemModalOpen);
            };

            const handleBatchSettle = async (memberId) => {
                if(window.confirm('確定要將此成員「墊付」的所有款項標記為已結清嗎？')) {
                    const batch = db.batch();
                    const itemsRef = db.collection('trips_v14').doc(currentTrip.id).collection('items');
                    const shoppingRef = db.collection('trips_v14').doc(currentTrip.id).collection('shopping_list');
                    
                    let count = 0;

                    itinerary.forEach(i => {
                        if (i.category !== 'loot' && !i.isPaid && (i.payerIds || []).includes(memberId)) {
                             batch.update(itemsRef.doc(i.id), { isPaid: true });
                             count++;
                        }
                    });

                    shoppingList.forEach(s => {
                        if (s.type === 'split' && !s.isPaid && s.payerId === memberId) {
                            batch.update(shoppingRef.doc(s.id), { isPaid: true });
                            count++;
                        }
                    });

                    if(count > 0) {
                        await batch.commit();
                    }
                }
            };

            const handleRateChange = async (newRate) => {
                if(newRate && !isNaN(newRate)) {
                    await db.collection('trips_v14').doc(currentTrip.id).update({ customRate: parseFloat(newRate) });
                }
            };

            const handleTouchStart = (e) => {
                touchStartX.current = e.changedTouches[0].screenX;
                touchStartY.current = e.changedTouches[0].screenY; 
            };

            const handleTouchEnd = (e) => {
                touchEndX.current = e.changedTouches[0].screenX;
                handleSwipeGesture(e.changedTouches[0].screenX, e.changedTouches[0].screenY); 
            };

            const handleSwipeGesture = (endX, endY) => {
                const threshold = 50; 
                const diffX = endX - touchStartX.current;
                const diffY = endY - touchStartY.current;
                if (Math.abs(diffY) > Math.abs(diffX)) return;
                if (Math.abs(diffX) < threshold) return;
                if (diffX > 0) { if (selectedDay > 1) setSelectedDay(selectedDay - 1); } 
                else { if (selectedDay < tripDays.length) setSelectedDay(selectedDay + 1); }
            };

            // --- Render ---
            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-white fade-out-bg">
                        <div className="text-6xl mb-4 bounce">🧳</div>
                        <p className="text-stone-400 text-sm font-bold tracking-widest animate-pulse">回憶讀取中...</p>
                    </div>
                );
            }

            if (viewMode === 'tripList') {
                return (
                    <div className="min-h-screen bg-gradient-to-b from-sky-50 to-white p-6 relative pb-24">
                        <h1 className="text-2xl font-bold text-theme-main mb-6 tracking-tight flex items-center gap-2">我的旅遊回憶箱 🧳</h1>
                        <div className="grid gap-4">
                            {trips.map(trip => (
                                <div key={trip.id} onClick={() => { 
                                    window.history.pushState({view: 'itinerary'}, '');
                                    setCurrentTrip(trip); setViewMode('itinerary'); setSelectedDay(1); 
                                }} className="bg-white p-5 rounded-3xl shadow-sm border border-sky-100 trip-card relative overflow-hidden group cursor-pointer card-gradient">
                                    <img src={`https://flagcdn.com/w160/${trip.country.toLowerCase()}.png`} className="absolute -right-6 -bottom-6 w-28 opacity-10 pointer-events-none object-contain transform rotate-12" alt="flag" />
                                    <div className="flex items-center gap-4 z-10 relative">
                                        <span className="text-4xl shrink-0">{trip.icon || '✈️'}</span>
                                        <div className="flex-1">
                                            <h2 className="font-bold text-lg text-stone-800 flex items-center gap-2">{trip.name} {trip.isLocked && <span className="text-red-500 text-xs border border-red-200 bg-red-50 px-1 rounded"><Icons.Lock/></span>}</h2>
                                            <p className="text-xs text-stone-500 font-medium mt-1 flex items-center gap-1"><Icons.Calendar/> {trip.startDate} ~ {trip.endDate}</p>
                                        </div>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setEditingItem(trip); openModal(setIsTripModalOpen); }} className="absolute top-4 right-4 p-2 text-stone-300 hover:text-theme-main z-20"><Icons.Settings/></button>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => { setEditingItem(null); openModal(setIsTripModalOpen); }} className="fixed bottom-8 right-6 w-14 h-14 bg-theme-main text-white rounded-full shadow-xl shadow-sky-300/50 flex items-center justify-center active-scale z-50"><Icons.Plus/></button>
                        {isTripModalOpen && <TripModal trip={editingItem} onClose={closeModal} onSave={handleSaveTrip} onDelete={handleDeleteTrip} />}
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-32 relative bg-white">
                    {previewImage && <div className="image-preview-overlay" onClick={() => window.history.back()}><ZoomableImage src={previewImage} /></div>}
                    
                    <header className="sticky top-0 z-40 glass-panel px-4 py-3 flex flex-col gap-3">
                        <div className="flex justify-between items-center">
                            <button onClick={() => window.history.back()} className="text-theme-main flex items-center gap-1 text-sm font-bold active-scale"><Icons.ArrowLeft/> 回列表</button>
                            <div className="flex gap-2">
                                <button onClick={() => openModal(setIsShoppingListOpen)} className="p-2 bg-sky-50 text-theme-main rounded-full active-scale"><Icons.ShoppingCart/></button>
                                <button onClick={() => openModal(setIsLuggageModalOpen)} className="p-2 bg-sky-50 text-theme-main rounded-full active-scale"><Icons.Suitcase/></button>
                                <button onClick={() => openModal(setIsMemberModalOpen)} className="p-2 bg-sky-50 text-theme-main rounded-full active-scale"><Icons.Users/></button>
                                <button onClick={() => openModal(setIsExportModalOpen)} className="p-2 bg-sky-50 text-theme-main rounded-full active-scale"><Icons.Export/></button>
                                <button onClick={() => { setLockPassword(''); openModal(setIsLockModalOpen); }} className={`p-2 rounded-full active-scale ${currentTrip.isLocked ? 'bg-red-100 text-red-500' : 'bg-sky-50 text-theme-main'}`}>{currentTrip.isLocked ? <Icons.Lock/> : <Icons.Unlock/>}</button>
                            </div>
                        </div>
                        <div className="flex justify-between items-end">
                             <div>
                                <h1 className="text-xl font-bold text-theme-main tracking-tight flex items-center gap-2"><span>{currentTrip.icon}</span> {currentTrip.name}</h1>
                                <p className="text-xs text-stone-500 font-bold mt-1 ml-1">{currentDayInfo.date} ({currentDayInfo.weekDay})</p>
                             </div>
                            <div className="text-right">
                                <button onClick={() => openModal(setShowAccounting)} className="text-sm text-white bg-theme-main px-3 py-1.5 rounded-full font-bold mb-1 shadow-lg active-scale">💰 分帳管家</button>
                            </div>
                        </div>
                        <div ref={daysContainerRef} className="flex gap-2 overflow-x-auto no-scrollbar pb-1 -mx-4 px-4 scroll-smooth">
                            {tripDays.map(d => (
                                <button key={d} onClick={() => setSelectedDay(d)} className={`flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold transition-all ${selectedDay === d ? 'bg-theme-main text-white shadow-md' : 'bg-white text-stone-400 border border-stone-100'}`}>Day {d}</button>
                            ))}
                        </div>
                    </header>

                    <main className="px-4 py-5 space-y-3 min-h-[50vh]" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        {currentDayItems.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 opacity-50">
                                <span className="text-6xl grayscale opacity-50">{currentTrip.icon}</span>
                                <p className="mt-4 text-stone-400 text-sm font-medium">Day {selectedDay} 還沒有行程</p>
                                <p className="text-xs text-stone-300 mt-2">左右滑動切換天數</p>
                            </div>
                        ) : (
                            currentDayItems.map(item => {
                                const payerIds = item.payerIds || [];
                                const isSelected = selectedItemIds.has(item.id);
                                const isImage = item.fileUrl && (item.fileUrl.includes('.jpg') || item.fileUrl.includes('.png') || item.fileUrl.includes('.jpeg') || item.fileUrl.includes('alt=media'));

                                return (
                                <div key={item.id} onClick={() => { 
                                    if (selectMode) toggleSelect(item.id); 
                                    else if (!reorderMode) { 
                                        if(currentTrip.isLocked) { alert("行程已鎖定"); return; } 
                                        setEditingItem(item); setForcePayerSelectInItemModal(false); openModal(setIsItemModalOpen); 
                                    } 
                                }}
                                    className={`bg-white p-4 rounded-2xl shadow-sm border border-stone-100 transition-all active:scale-[0.99] cursor-pointer relative overflow-hidden item-card-gradient ${isSelected ? 'border-theme-main ring-2 ring-sky-100 bg-sky-50' : ''} ${reorderMode ? 'scale-95 border-orange-200' : ''}`}
                                >
                                    <div className="flex gap-4 relative z-10 pointer-events-none">
                                        {selectMode && (<div className="flex items-center justify-center pr-1">{isSelected ? <div className="text-theme-main"><Icons.CheckCircle/></div> : <div className="text-stone-300"><Icons.Circle/></div>}</div>)}
                                        <div className="flex flex-col items-center pt-1 min-w-[70px]">
                                            {item.category === 'transport' ? (<div className="flex flex-col items-center justify-center text-theme-main"><span className="text-2xl mb-1"><TransportIcon type={item.transportType} /></span><div className="flex flex-col items-center text-lg font-bold leading-none text-theme-main"><span>{item.departureTime || '--:--'}</span><span className="text-[10px] text-stone-300 my-[-2px] rotate-90">|</span><span>{item.arrivalTime || '--:--'}</span></div></div>) : item.category === 'hotel' ? (<div className="flex flex-col items-center"><span className="font-bold text-lg text-indigo-500 leading-none">{item.checkInTime || '15:00'}</span><span className="text-2xl mt-1">🏢</span></div>) : item.category === 'checklist' ? (<span className="text-2xl">✨️</span>) : (<div className="flex flex-col items-center"><span className="font-bold text-lg text-theme-main leading-none">{item.time || '--:--'}</span>
                                                <div className="mt-1"><CategoryIcon type={item.category} /></div>
                                            </div>)}
                                        </div>
                                        <div className="flex-1 min-w-0 space-y-1">
                                            <div className="flex justify-between items-start">
                                                <div className="flex items-center gap-2">
                                                    <h3 className="font-bold text-stone-800 truncate text-base">{item.title}</h3>
                                                </div>
                                                {item.cost > 0 && !selectMode && !reorderMode && <div onClick={(e) => { e.stopPropagation(); if(!currentTrip.isLocked) togglePaid(item); else alert("行程已鎖定"); }} className={`pointer-events-auto shrink-0 flex items-center gap-1 text-[10px] px-2 py-1 rounded-full border transition-colors cursor-pointer ${item.isPaid ? 'bg-green-50 text-green-600 border-green-200' : 'bg-red-50 text-red-500 border-red-100'}`}>{item.isPaid ? <Icons.CheckCircle/> : <Icons.Circle/>} {item.isPaid ? '已付' : '未付'}</div>}
                                            </div>
                                            {item.memo && <div className="bg-stone-50 p-2 rounded-lg text-xs text-stone-600 mt-1 whitespace-pre-wrap border border-stone-100">{item.memo}</div>}
                                            {(item.category === 'transport') && (<div className="bg-stone-50 p-2 rounded-lg text-xs text-stone-600 space-y-1"><div className="font-bold text-theme-main">{item.transportNo}</div><div className="flex justify-between items-center font-medium"><span>{item.departureLoc}</span><span className="text-stone-300">➔</span><span>{item.arrivalLoc}</span></div></div>)}
                                            {item.category === 'checklist' && (
                                                <div className="space-y-2 mt-1 pointer-events-auto">
                                                    {(item.checklist || []).map((check, idx) => (
                                                        <div key={idx} onClick={(e) => { e.stopPropagation(); if(!currentTrip.isLocked) toggleChecklistItem(item.id, idx); else alert("行程已鎖定"); }} className="flex items-center gap-2 text-sm text-stone-700 cursor-pointer bg-stone-50 p-2 rounded-lg active:bg-stone-100">
                                                            <div className={`w-5 h-5 border-2 rounded flex items-center justify-center transition-colors shrink-0 ${check.checked ? 'bg-theme-main border-theme-main text-white' : 'border-stone-300 bg-white'}`}>{check.checked && <Icons.Check/>}</div>
                                                            <span className={check.checked ? 'line-through text-stone-400 decoration-2' : ''}>{check.text}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                            {item.location && !item.location.startsWith('http') && <div className="inline-flex items-center gap-1 text-xs text-stone-400 bg-stone-50 px-2 py-0.5 rounded-md max-w-full truncate"><Icons.MapPin/> {item.location}</div>}
                                            {item.location && item.location.startsWith('http') && <a href={item.location} target="_blank" onClick={e => e.stopPropagation()} className="pointer-events-auto inline-flex items-center gap-1 text-xs text-white bg-blue-500 px-3 py-1 rounded-full shadow-sm active:bg-blue-600 transition-colors max-w-full truncate font-bold my-1"><Icons.MapPin/> 開啟地圖</a>}
                                            <div className="flex justify-between items-end">
                                                {item.notes && <p className="text-xs text-stone-500 bg-stone-50 p-2 rounded-lg mt-1 max-w-[70%]">{item.notes}</p>}
                                                {item.cost > 0 && <div className="text-right flex flex-col items-end ml-auto"><p className="text-sm font-bold text-theme-main">{item.currency === 'TWD' ? 'TWD' : COUNTRIES[currentTrip.country].currency} {Number(item.cost).toLocaleString()}</p>
                                                    <div className="flex -space-x-1 mt-1">
                                                        {payerIds.map(pid => {
                                                            const m = members.find(x => x.id === pid);
                                                            return m ? <div key={pid} className={`w-5 h-5 ${m.color} rounded-full text-white flex items-center justify-center text-xs ring-1 ring-white`}>{m.emoji}</div> : null;
                                                        })}
                                                    </div>
                                                </div>}
                                            </div>
                                            {item.fileUrl && <div className="mt-2 pointer-events-auto">{isImage ? (<div className="w-full h-32 bg-stone-100 rounded-lg overflow-hidden border border-stone-200 cursor-pointer relative" onClick={(e) => { e.stopPropagation(); handlePreviewImage(item.fileUrl); }}><img src={item.fileUrl} className="w-full h-full object-cover" alt="附件" /><div className="absolute bottom-1 right-1 bg-black/50 text-white text-[10px] px-1.5 rounded">🔍 點擊放大</div></div>) : (<a href={item.fileUrl} target="_blank" onClick={e => e.stopPropagation()} className="inline-flex gap-1 text-[10px] bg-sky-50 text-theme-main px-2 py-1 rounded-full border border-sky-100 font-bold active-scale"><Icons.ExternalLink/> 查看附件</a>)}</div>}
                                        </div>
                                        {reorderMode && !currentTrip.isLocked && <div className="flex flex-col justify-center gap-1 pl-2 border-l border-stone-100 pointer-events-auto"><button onClick={(e) => { e.stopPropagation(); handleReorder(item, 'up'); }} className="p-1.5 bg-stone-100 rounded-full text-stone-500 active:bg-stone-200"><Icons.ChevronUp/></button><button onClick={(e) => { e.stopPropagation(); handleReorder(item, 'down'); }} className="p-1.5 bg-stone-100 rounded-full text-stone-500 active:bg-stone-200"><Icons.ChevronDown/></button></div>}
                                    </div>
                                </div>
                                );
                            })
                        )}
                    </main>

                    <div className="fixed bottom-8 left-6 z-50">
                        <button onClick={() => openModal(setIsLootModalOpen)} className="w-14 h-14 bg-pink-500 text-white rounded-full shadow-xl shadow-pink-300/50 flex items-center justify-center active-scale border-4 border-white">
                            <Icons.ShoppingBag />
                        </button>
                    </div>

                    <div className="fixed bottom-8 right-6 flex flex-col items-center gap-3 z-50">
                        {selectMode && (
                            <div className="flex justify-end w-full">
                                <button onClick={() => { setSelectMode(false); setSelectedItemIds(new Set()); }} className="w-10 h-10 bg-white text-stone-500 rounded-full shadow-md flex items-center justify-center border border-stone-200 active:scale-95">
                                    <Icons.Undo />
                                </button>
                            </div>
                        )}

                        {!currentTrip.isLocked && !reorderMode && !selectMode && (
                            <button onClick={() => toggleMode(setSelectMode, true)} className={`w-14 h-14 rounded-full shadow-xl flex items-center justify-center transition-all active-scale bg-white text-stone-400`}>
                                <Icons.ArrowLeftRight />
                            </button>
                        )}

                        {!currentTrip.isLocked && !selectMode && (
                            <button onClick={() => { if(reorderMode) window.history.back(); else toggleMode(setReorderMode, true); }} className={`w-14 h-14 rounded-full shadow-xl flex items-center justify-center transition-all active-scale ${reorderMode ? 'bg-orange-500 text-white' : 'bg-white text-stone-400'}`}>
                                {reorderMode ? <Icons.Check /> : <Icons.ArrowUpDown />}
                            </button>
                        )}

                        {!selectMode && !reorderMode && !currentTrip.isLocked && (
                            <button onClick={() => { setEditingItem(null); setForcePayerSelectInItemModal(false); openModal(setIsItemModalOpen); }} className="w-14 h-14 bg-theme-main text-white rounded-full shadow-xl shadow-sky-300/50 flex items-center justify-center active-scale"><Icons.Plus/></button>
                        )}
                        
                        {selectMode && (
                            <div className="flex flex-col gap-2 bg-white p-2 rounded-2xl shadow-xl border border-sky-100">
                                <button onClick={() => openModal(setIsMoveModalOpen)} className="bg-theme-main text-white px-4 py-2 rounded-xl font-bold shadow active-scale disabled:opacity-50" disabled={selectedItemIds.size===0}>
                                    選取 {selectedItemIds.size} 項
                                </button>
                            </div>
                        )}
                    </div>

                    {isTripModalOpen && <TripModal trip={editingItem} onClose={closeModal} onSave={handleSaveTrip} onDelete={handleDeleteTrip} />}
                    {isItemModalOpen && <ItemModal item={editingItem} day={selectedDay} country={currentTrip.country} tripId={currentTrip.id} members={members} onClose={() => {closeModal(); setForcePayerSelectInItemModal(false);}} onSave={handleSaveItem} onDelete={handleDeleteItem} forcePayerSelect={forcePayerSelectInItemModal} isLocked={currentTrip.isLocked} />}
                    {isMoveModalOpen && <MoveDayModal days={tripDays} currentDay={selectedDay} count={selectedItemIds.size} onClose={closeModal} onMove={handleBatchMove} />}
                    {showAccounting && <AccountingModal itinerary={itinerary} shoppingList={shoppingList} currency={COUNTRIES[currentTrip.country].currency} onClose={closeModal} members={members} onEditItem={handleEditFromAccounting} rate={currentTrip.customRate || COUNTRIES[currentTrip.country].rate} onTogglePaid={togglePaidFromAccounting} accountingMember={accountingMember} setAccountingMember={handleAccountingMember} isLocked={currentTrip.isLocked} handleBatchSettle={handleBatchSettle} onRateChange={handleRateChange} />}
                    {isLockModalOpen && <LockModal isLocked={currentTrip.isLocked} onClose={closeModal} onConfirm={handleLockTrip} />}
                    {isExportModalOpen && <ExportModal itinerary={itinerary} tripName={currentTrip.name} onClose={closeModal} />}
                    {isLootModalOpen && <LootModal members={members} activeMemberId={activeLootMember} setActiveMemberId={setActiveLootMember} lootList={itinerary.filter(i => i.category === 'loot' && i.payerIds?.includes(activeLootMember))} onClose={closeModal} onAdd={handleAddLoot} onEdit={(item)=> {setEditingItem(item); setForcePayerSelectInItemModal(false); openModal(setIsItemModalOpen);}} onDelete={(id) => handleDeleteItem(id, false)} setPreviewImage={handlePreviewImage} isLocked={currentTrip.isLocked} rate={currentTrip.customRate || COUNTRIES[currentTrip.country].rate} />}
                    
                    {isMemberModalOpen && <MemberModal members={members} onClose={closeModal} onAdd={handleAddMember} onDelete={handleDeleteMember} isLocked={currentTrip.isLocked} />}
                    {isLuggageModalOpen && <LuggageModal luggageList={luggageList} members={members} onClose={closeModal} onAdd={handleAddLuggage} onToggle={handleToggleLuggage} onDelete={handleDeleteLuggage} isLocked={currentTrip.isLocked} />}

                    {isShoppingListOpen && (
                        <ShoppingListModal 
                            shoppingList={shoppingList} 
                            members={members} 
                            country={currentTrip.country} 
                            tripId={currentTrip.id}
                            onClose={closeModal} 
                            onAdd={() => { setEditingShoppingItem(null); openModal(setIsShoppingItemModalOpen); }}
                            onEdit={(item) => { setEditingShoppingItem(item); openModal(setIsShoppingItemModalOpen); }}
                            onDelete={(id, close) => handleDeleteShoppingItem(id, close)}
                            onCheck={handleCheckShoppingItem}
                            onTogglePaid={toggleShoppingPaid}
                            setPreviewImage={handlePreviewImage}
                            onRestore={handleRestoreShoppingItem}
                            isLocked={currentTrip.isLocked}
                        />
                    )}
                    {isShoppingItemModalOpen && (
                        <ShoppingItemModal 
                            item={editingShoppingItem} 
                            country={currentTrip.country} 
                            tripId={currentTrip.id} 
                            members={members} 
                            onClose={closeModal} 
                            onSave={handleSaveShoppingItem}
                            onDelete={(id) => handleDeleteShoppingItem(id, true)} 
                            isLocked={currentTrip.isLocked}
                        />
                    )}
                    {checkPromptItem && (
                        <ShoppingCheckModal 
                            onClose={() => setCheckPromptItem(null)} 
                            onSelect={handleShoppingCheckSelection} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 註冊成功', reg))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }
    </script>
</body>
</html>
