        const getDayInfo = (startDateStr, dayNum) => {
            if (!startDateStr) return { date: '', weekDay: '' };
            const date = new Date(startDateStr);
            date.setDate(date.getDate() + (dayNum - 1));
            const weekDays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            return { date: date.toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'}), weekDay: weekDays[date.getDay()] };
        };

        const calculateLength = (str) => {
            let len = 0;
            for (let i = 0; i < str.length; i++) {
                if (str.charCodeAt(i) > 127 || str.charCodeAt(i) === 94) {
                    len += 2;
                } else {
                    len += 1;
                }
            }
            return len;
        };

        const ZoomableImage = ({ src }) => {
            const [scale, setScale] = useState(1);
            const [translate, setTranslate] = useState({ x: 0, y: 0 });
            const containerRef = useRef(null);
            const initialDistance = useRef(0);
            const initialScale = useRef(1);
            const initialTranslate = useRef({ x: 0, y: 0 });
            const startTouch = useRef({ x: 0, y: 0 });

            const getDistance = (touches) => {
                return Math.hypot(
                    touches[0].pageX - touches[1].pageX,
                    touches[0].pageY - touches[1].pageY
                );
            };

            const handleTouchStart = (e) => {
                if (e.touches.length === 2) {
                    initialDistance.current = getDistance(e.touches);
                    initialScale.current = scale;
                    const midX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    const midY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    startTouch.current = { x: midX, y: midY };
                    initialTranslate.current = { ...translate };
                } else if (e.touches.length === 1 && scale > 1) {
                    startTouch.current = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                    initialTranslate.current = { ...translate };
                }
            };

            const handleTouchMove = (e) => {
                if (e.touches.length === 2) {
                    const currentDistance = getDistance(e.touches);
                    const rawRatio = currentDistance / initialDistance.current;
                    const dampenedRatio = 1 + (rawRatio - 1) * 0.6;
                    const newScale = Math.max(1, Math.min(3, initialScale.current * dampenedRatio));
                    setScale(newScale);

                    const midX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    const midY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    const dx = midX - startTouch.current.x;
                    const dy = midY - startTouch.current.y;

                    setTranslate({
                        x: initialTranslate.current.x + dx,
                        y: initialTranslate.current.y + dy
                    });

                    if (newScale === 1) setTranslate({ x: 0, y: 0 });
                } else if (e.touches.length === 1 && scale > 1) {
                    e.preventDefault();
                    const dx = e.touches[0].pageX - startTouch.current.x;
                    const dy = e.touches[0].pageY - startTouch.current.y;
                    setTranslate({
                        x: initialTranslate.current.x + dx,
                        y: initialTranslate.current.y + dy
                    });
                }
            };

            return (
                <div 
                    ref={containerRef}
                    className="w-full h-full flex items-center justify-center overflow-hidden touch-none"
                    onTouchStart={handleTouchStart}
                    onTouchMove={handleTouchMove}
                    onClick={(e) => e.stopPropagation()} 
                >
                    <img 
                        src={src} 
                        className="max-w-full max-h-full object-contain"
                        style={{ transform: `translate(${translate.x}px, ${translate.y}px) scale(${scale})` }}
                        alt="Preview"
                    />
                </div>
            );
        };

            const handleConfirm = async () => {

                    const dataToSave = { ...form };

                            <div>

                                <select value={form.country} onChange={e => setForm({...form, country: e.target.value})} className="w-full p-3 bg-stone-50 rounded-xl border outline-none text-stone-700">

                                </select>
                            </div>
                            
                            <div>
                                <label className="text-xs text-stone-500 font-bold ml-1 mb-1 block">自訂匯率 (選填，預設 {COUNTRIES[form.country].rate})</label>

                                    <div className="w-10 h-10 flex items-center justify-center bg-yellow-100 rounded-lg text-yellow-600 text-xl">💱</div>
                                    <input type="number" step="0.0001" placeholder={`預設: ${COUNTRIES[form.country].rate}`} value={form.customRate} onChange={e => setForm({...form, customRate: e.target.value})} className="flex-1 p-3 bg-stone-50 rounded-xl border outline-none"/>
                                </div>
                            </div>

                            <div>
                                <label className="text-xs text-stone-500 font-bold ml-1 mb-1 block">選擇代表圖示 (可左右滑動)</label>

                                    {TRIP_ICONS.map(i => (
                                        <button key={i} onClick={() => setForm({...form, icon: i})} className={`flex-shrink-0 w-12 h-12 text-2xl rounded-xl flex items-center justify-center transition-all ${form.icon === i ? 'bg-sky-100 border-2 border-sky-300 scale-110 shadow-md' : 'bg-stone-50 border border-stone-100 grayscale opacity-70'}`}>
                                            {i}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-2">
                            <input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})} className="flex-1 p-3 bg-stone-50 rounded-xl"/>

                        </div> 
                        
                        <div className="flex gap-2">
                            {trip && <button onClick={()=>onDelete(trip.id)} className="p-3 bg-red-50 text-red-500 rounded-xl"><Icons.Trash2/></button>}
                            <button onClick={handleConfirm} disabled={saving} className={`flex-1 p-3 text-white rounded-xl font-bold ${saving ? 'bg-stone-400' : 'bg-theme-main'}`}>{saving ? '⏳ 儲存中...' : '儲存'}</button>
                        </div>
                    </div> 
                </div> 
            ); 
        };

        const ItemModal = ({ item, day, country, tripId, members, onClose, onSave, onDelete, forcePayerSelect, isLocked }) => {
            const [form, setForm] = useState({ day, time: '', title: '', category: 'sight', location: '', cost: '', currency: COUNTRIES[country].currency, notes: '', memo: '', payerIds: [], sharedInvolvedIds: [], fileUrl: '', images: [], checklist: [], transportType: 'plane', transportNo: '', departureTime: '', arrivalTime: '', departureLoc: '', arrivalLoc: '', checkInTime: '' });
            const [uploading, setUploading] = useState(false);
            const [saving, setSaving] = useState(false);
            const fileInputRef = useRef(null);
            
            useEffect(() => { 
                if(item) setForm({...form, ...item}); 
            }, [item]);

            const togglePayer = (pid) => { const current = form.payerIds || []; setForm({...form, payerIds: current.includes(pid) ? current.filter(id=>id!==pid) : [...current, pid]}); };
            
            const toggleShared = (pid) => { 
                const current = form.sharedInvolvedIds && form.sharedInvolvedIds.length > 0 ? form.sharedInvolvedIds : members.map(m=>m.id);
                const newShared = current.includes(pid) ? current.filter(id => id !== pid) : [...current, pid];
                setForm({...form, sharedInvolvedIds: newShared});
            };

            const isShared = (pid) => {
                if (!form.sharedInvolvedIds || form.sharedInvolvedIds.length === 0) return true;
                return form.sharedInvolvedIds.includes(pid);
            };

            const handleFileUpload = async (e) => { 
                const file = e.target.files[0]; 
                if(!file) return; 
                setUploading(true); 
                try { 
                    const ref = firebase.storage().ref().child(`trips/${tripId}/${Date.now()}_${file.name}`); 
                    await ref.put(file); 
                    const url = await ref.getDownloadURL(); 
                    setForm(p => ({ ...p, fileUrl: url })); 
                } catch (e) { alert("上傳失敗"); } 
                setUploading(false); 
            };
            const handleTimeInput = (e, field) => { let v = e.target.value.replace(/[^0-9]/g, ''); if (v.length > 4) v = v.slice(0, 4); if (v.length > 2) v = v.slice(0, 2) + ':' + v.slice(2); setForm(prev => ({ ...prev, [field]: v })); };

            const handleConfirm = async () => {
                if (forcePayerSelect && (!form.payerIds || form.payerIds.length === 0)) {
                    alert("請選擇是誰買的！");
                    return;
                }
                setSaving(true);
                let finalForm = {...form};
                if(form.category === 'loot') {
                     finalForm.sharedInvolvedIds = form.payerIds; 
                }

                try { await onSave(finalForm); onClose(); } catch(e) { alert("儲存失敗"); }
                setSaving(false);

                        {form.category !== 'loot' && (
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">

                                    </button>
                                ))}
                            </div>
                        )}

                        {form.category === 'checklist' ? (
                            <div className="space-y-2"><input type="text" placeholder="清單標題" value={form.title} onChange={e=>setForm({...form, title:e.target.value})} className="w-full p-3 bg-white border rounded-xl font-bold"/>{form.checklist.map((check, i) => (<div key={i} className="flex gap-2 items-center"><input type="text" value={check.text} onChange={e=>{const list=[...form.checklist]; list[i].text=e.target.value; setForm({...form, checklist:list})}} className="flex-1 p-2 border rounded-lg"/><button onClick={()=>{const list=[...form.checklist]; list.splice(i,1); setForm({...form, checklist:list})}} className="text-red-400 shrink-0"><Icons.Trash2/></button></div>))}<button onClick={()=>setForm({...form, checklist:[...form.checklist, {text:'', checked:false}]})} className="text-xs text-theme-main font-bold">+ 新增項目</button></div>

                            <>
                                <div className="flex gap-4">
                                    {form.category !== 'loot' && form.category !== 'transport' && form.category !== 'hotel' && (<div className="w-1/3"><label className="text-[10px] font-bold text-stone-400 uppercase">時間</label><input type="tel" value={form.time} onChange={e => handleTimeInput(e, 'time')} placeholder="10:00" className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl font-bold text-center outline-none focus:border-theme-main"/></div>)}
                                    <div className="flex-1"><label className="text-[10px] font-bold text-stone-400 uppercase">{form.category==='transport'?'航班/車次': form.category==='hotel'?'飯店名稱':'名稱'}</label><input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl font-medium outline-none focus:border-theme-main"/></div>
                                </div>
                                
                                {form.category === 'transport' && (<div className="bg-stone-50 p-3 rounded-xl space-y-2"><div className="flex gap-2"><select value={form.transportType} onChange={e=>setForm({...form, transportType:e.target.value})} className="p-2 rounded-lg w-full"><option value="plane">✈️ 飛機</option><option value="train">🚆 火車</option><option value="bus">🚌 巴士</option><option value="ferry">⛴️ 渡輪</option></select></div><div className="flex gap-2 items-center"><span className="text-xs font-bold w-8 text-stone-400">出發</span><input type="tel" value={form.departureTime} onChange={e=>handleTimeInput(e, 'departureTime')} placeholder="20:00" className="w-24 p-2 rounded-lg"/><input placeholder="出發地" value={form.departureLoc} onChange={e=>setForm({...form, departureLoc:e.target.value})} className="flex-1 p-2 rounded-lg"/></div><div className="flex gap-2 items-center"><span className="text-xs font-bold w-8 text-stone-400">抵達</span><input type="tel" value={form.arrivalTime} onChange={e=>handleTimeInput(e, 'arrivalTime')} placeholder="23:30" className="w-24 p-2 rounded-lg"/><input placeholder="目的地" value={form.arrivalLoc} onChange={e=>setForm({...form, arrivalLoc:e.target.value})} className="flex-1 p-2 rounded-lg"/></div></div>)}
                                {form.category === 'hotel' && (<div><label className="text-[10px] font-bold text-stone-400 uppercase">入住時間</label><input type="tel" value={form.checkInTime} onChange={e=>handleTimeInput(e, 'checkInTime')} placeholder="15:00" className="w-full p-3 bg-white border rounded-xl"/></div>)}
                                
                                <div><label className="text-[10px] font-bold text-stone-400 uppercase">備註</label><textarea placeholder={form.category === 'loot' ? "買了什麼口味..." : "例如: 發車時間..."} value={form.memo} onChange={e => setForm({...form, memo: e.target.value})} className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-theme-main resize-none h-40"></textarea></div>
                                
                                {form.category !== 'loot' && <div><label className="text-[10px] font-bold text-stone-400 uppercase">地點 (網址自動變連結)</label><input type="text" placeholder="Google Maps..." value={form.location} onChange={e => setForm({...form, location: e.target.value})} className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-theme-main" /></div>}
                                
                                <div className="bg-stone-50 p-3 rounded-xl border border-stone-100 space-y-3 overflow-hidden">
                                    <div className="flex gap-2 w-full">
                                        <select value={form.currency} onChange={e=>setForm({...form, currency:e.target.value})} className="w-1/3 p-2 rounded-xl bg-white border text-sm"><option value={COUNTRIES[country].currency}>{COUNTRIES[country].currency}</option><option value="TWD">TWD</option></select>
                                        <input type="number" placeholder="0" value={form.cost} onChange={e => setForm({...form, cost: e.target.value})} className="flex-1 min-w-0 p-2 bg-white border rounded-xl text-right font-bold"/>
                                    </div>
                                    {(form.category !== 'loot' || forcePayerSelect) && (
                                        <>
                                            <div>
                                                <label className="text-[10px] font-bold text-stone-400 uppercase mb-1 block">誰付錢？(可多選)</label>
                                                <div className="flex gap-2 overflow-x-auto py-1">{members.length > 0 ? members.map(m => (<button key={m.id} onClick={() => togglePayer(m.id)} className={`flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full border text-xl transition-all ${form.payerIds?.includes(m.id) ? `${m.color} text-white border-transparent shadow-md scale-110` : 'bg-white border-stone-200 grayscale opacity-60'}`}>{m.emoji}</button>)) : <span className="text-xs text-stone-400">請先至右上角新增參與者</span>}</div>
                                            </div>
                                            {form.category !== 'loot' && (
                                                <div className="pt-2 border-t border-stone-200 mt-2">
                                                    <label className="text-[10px] font-bold text-stone-400 uppercase mb-1 block">分攤給誰？(受益人，預設全選)</label>
                                                    <div className="flex gap-2 overflow-x-auto py-1">{members.length > 0 ? members.map(m => (<button key={m.id} onClick={() => toggleShared(m.id)} className={`flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full border text-sm transition-all ${isShared(m.id) ? `bg-white border-theme-main text-theme-main shadow-sm` : 'bg-stone-100 border-transparent text-stone-300 opacity-60'}`}>{m.emoji}</button>)) : null}</div>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </div>
                            </>
                        )}
                        
                        <div>
                            <label className="text-[10px] font-bold text-stone-400 uppercase">照片</label>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept="image/*" />
                            <div className="flex gap-2 mb-2 overflow-x-auto">
                                {form.fileUrl && (
                                    <div className="w-full h-32 bg-stone-100 rounded-lg overflow-hidden border border-stone-200 relative">
                                        <img src={form.fileUrl} className="w-full h-full object-cover" />
                                        <button onClick={()=>setForm({...form, fileUrl:''})} className="absolute top-2 right-2 bg-black/50 text-white px-2 rounded text-xs">移除</button>
                                    </div>
                                )}
                            </div>
                            <button onClick={() => fileInputRef.current.click()} disabled={uploading} className={`w-full p-3 border border-dashed rounded-xl flex items-center justify-center gap-2 ${uploading ? 'text-gray-400 bg-gray-50' : 'text-stone-400'}`}>
                                <Icons.Camera className="w-4 h-4" /> {uploading ? '⏳ 上傳中...' : '選擇照片'}
                            </button>
                        </div>

                        {!isLocked && (
                            <div className="flex gap-3 pt-4 border-t border-stone-100">
                                {item && onDelete && <button onClick={() => onDelete(item.id)} className="p-4 bg-red-50 text-red-400 rounded-xl"><Icons.Trash2/></button>}
                                <button onClick={handleConfirm} disabled={uploading || saving} className={`flex-1 text-white font-bold py-4 rounded-xl shadow-lg ${saving ? 'bg-stone-400' : 'bg-theme-main'}`}>{saving ? '⏳ 儲存中...' : '確認'}</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ShoppingItemModal = ({ item, country, tripId, members, onClose, onSave, onDelete, isLocked }) => {
            const [form, setForm] = useState({ text: '', cost: '', currency: COUNTRIES[country].currency, memo: '', location: '', fileUrl: '', payerId: '', type: 'normal', sharedInvolvedIds: [] });
            const [uploading, setUploading] = useState(false);
            const [saving, setSaving] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => { if(item) setForm({...item, sharedInvolvedIds: item.sharedInvolvedIds || []}); }, [item]);

            const toggleShared = (pid) => { 
                const current = form.sharedInvolvedIds && form.sharedInvolvedIds.length > 0 ? form.sharedInvolvedIds : members.map(m=>m.id);
                const newShared = current.includes(pid) ? current.filter(id => id !== pid) : [...current, pid];
                setForm({...form, sharedInvolvedIds: newShared});
            };
            const isShared = (pid) => (!form.sharedInvolvedIds || form.sharedInvolvedIds.length === 0) ? true : form.sharedInvolvedIds.includes(pid);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                try {
                    const ref = firebase.storage().ref().child(`trips/${tripId}/${Date.now()}_shop_${file.name}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    setForm(p => ({ ...p, fileUrl: url }));
                } catch (e) { alert("上傳失敗"); }
                setUploading(false);
            };

            const handleConfirm = async () => {
                if (form.type === 'split' && !form.payerId) {
                    alert("分帳模式必須選擇一位先付錢的人！");
                    return;
                }
                setSaving(true);
                try { await onSave(form); onClose(); } catch (e) { alert("儲存失敗"); }
                setSaving(false);
            };

            return (
                <div className="fixed inset-0 z-[70] flex items-end justify-center bg-black/50 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-[#FDFBF7] w-full max-w-md rounded-t-3xl shadow-2xl p-6 space-y-4 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center border-b pb-2">
                            <h2 className="font-bold text-lg text-theme-main">{item ? '編輯購物項目' : '新增購物項目'}</h2>
                            <button onClick={onClose} className="text-lg">❌</button>
                        </div>

                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">品名</label><input type="text" value={form.text} onChange={e => setForm({ ...form, text: e.target.value })} className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl font-medium outline-none focus:border-theme-main" placeholder="想買什麼..." /></div>

                        <div className="bg-stone-50 p-3 rounded-xl border border-stone-100 space-y-3">
                            <div className="flex gap-2 w-full">
                                <select value={form.currency} onChange={e => setForm({ ...form, currency: e.target.value })} className="w-1/3 p-2 rounded-xl bg-white border text-sm"><option value={COUNTRIES[country].currency}>{COUNTRIES[country].currency}</option><option value="TWD">TWD</option></select>
                                <input type="number" placeholder="預估金額" value={form.cost} onChange={e => setForm({ ...form, cost: e.target.value })} className="flex-1 min-w-0 p-2 bg-white border rounded-xl text-right font-bold" />
                            </div>
                            
                            {form.type === 'split' && (
                                <>
                                    <div>
                                        <label className="text-[10px] font-bold text-emerald-500 uppercase mb-1 block">此單需分帳，是誰先付錢？</label>
                                        <div className="flex gap-2 overflow-x-auto py-1">
                                            {members.length > 0 ? members.map(m => (
                                                <button key={m.id} onClick={() => setForm({ ...form, payerId: m.id })} className={`flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full border text-xl transition-all ${form.payerId === m.id ? `${m.color} text-white border-transparent shadow-md scale-110` : 'bg-white border-stone-200 grayscale opacity-60'}`}>{m.emoji}</button>
                                            )) : <span className="text-xs text-stone-400">請先新增成員</span>}
                                        </div>
                                    </div>
                                    <div className="pt-2 border-t border-stone-200">
                                        <label className="text-[10px] font-bold text-stone-400 uppercase mb-1 block">分攤給誰？(受益人，預設全選)</label>
                                        <div className="flex gap-2 overflow-x-auto py-1">{members.length > 0 ? members.map(m => (<button key={m.id} onClick={() => toggleShared(m.id)} className={`flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full border text-sm transition-all ${isShared(m.id) ? `bg-white border-theme-main text-theme-main shadow-sm` : 'bg-stone-100 border-transparent text-stone-300 opacity-60'}`}>{m.emoji}</button>)) : null}</div>
                                    </div>
                                </>
                            )}
                        </div>

                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">備註</label><textarea placeholder="顏色、尺寸..." value={form.memo} onChange={e => setForm({ ...form, memo: e.target.value })} className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-theme-main resize-none h-40"></textarea></div>
                        <div><label className="text-[10px] font-bold text-stone-400 uppercase">購買地點 (網址)</label><input type="text" placeholder="Google Maps Link..." value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} className="w-full mt-1 p-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-theme-main" /></div>

                        <div>
                            <label className="text-[10px] font-bold text-stone-400 uppercase">參考照片</label>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept="image/*" />
                            {form.fileUrl && (<div className="w-full h-32 bg-stone-100 rounded-lg overflow-hidden border border-stone-200 relative mb-2"><img src={form.fileUrl} className="w-full h-full object-cover" /><button onClick={() => setForm({ ...form, fileUrl: '' })} className="absolute top-2 right-2 bg-black/50 text-white px-2 rounded text-xs">移除</button></div>)}
                            <button onClick={() => fileInputRef.current.click()} disabled={uploading} className={`w-full p-3 border border-dashed rounded-xl flex items-center justify-center gap-2 ${uploading ? 'text-gray-400 bg-gray-50' : 'text-stone-400'}`}><Icons.Camera className="w-4 h-4" /> {uploading ? '⏳ 上傳中...' : '選擇照片'}
                            </button>
                        </div>

                        {!isLocked && (
                            <div className="flex gap-3 pt-4 border-t border-stone-100">
                                {item && onDelete && <button onClick={() => onDelete(item.id, true)} className="p-4 bg-red-50 text-red-400 rounded-xl"><Icons.Trash2/></button>}
                                <button onClick={handleConfirm} disabled={uploading || saving} className={`flex-1 text-white font-bold py-4 rounded-xl shadow-lg ${saving ? 'bg-stone-400' : 'bg-theme-main'}`}>{saving ? '⏳ 儲存中...' : '確認'}</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ShoppingCheckModal = ({ onClose, onSelect }) => {
            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center bg-black/50 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white w-full max-w-xs p-6 rounded-3xl shadow-2xl space-y-4" onClick={e => e.stopPropagation()}>
                        <h3 className="text-center font-bold text-lg text-stone-800">購物確認</h3>
                        <p className="text-center text-sm text-stone-500 mb-4">這筆消費要如何處理？</p>
                        
                        <button onClick={() => onSelect('loot')} className="w-full py-3 bg-pink-500 text-white rounded-xl font-bold shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                            🎁 登記為戰利品
                            <span className="text-[10px] bg-pink-600 px-1 rounded opacity-80">個人</span>
                        </button>
                        
                        <button onClick={() => onSelect('split')} className="w-full py-3 bg-emerald-400 text-white rounded-xl font-bold shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                            💰 此單需分帳
                            <span className="text-[10px] bg-emerald-500 px-1 rounded opacity-80">公費</span>
                        </button>
                        
                        <button onClick={() => onSelect('simple')} className="w-full py-3 bg-stone-100 text-stone-500 rounded-xl font-bold active:scale-95 transition-transform">
                            ✔️ 純紀錄已買 (歸檔)
                        </button>
                    </div>
                </div>
            );
        };

        const ShoppingListModal = ({ shoppingList, members, country, tripId, onClose, onAdd, onEdit, onDelete, onCheck, onTogglePaid, setPreviewImage, onRestore, isLocked }) => {
            const [isGalleryMode, setIsGalleryMode] = useState(false); 

            const sortedList = useMemo(() => {

        const AccountingModal = ({ itinerary, shoppingList, currency, onClose, members, onEditItem, rate, onTogglePaid, accountingMember, setAccountingMember, isLocked, handleBatchSettle, onRateChange }) => {
